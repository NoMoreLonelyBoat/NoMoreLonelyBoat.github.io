<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Guying_xz 的个人主页 - 淡绿色调 | 梦幻粒子·玻璃态">
    <title>Guying_xz · 林下风来 | 酷炫流光</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 酷炫动态渐变背景 + 噪点质感 */
        body {
            background: radial-gradient(circle at 10% 20%, rgba(210, 235, 210, 0.95), rgba(190, 220, 185, 0.9));
            background-attachment: fixed;
            font-family: 'Segoe UI', 'Poppins', system-ui, 'Inter', -apple-system, 'Helvetica Neue', sans-serif;
            color: #1c3a1f;
            line-height: 1.5;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            animation: breatheGlow 12s ease-in-out infinite alternate;
        }

        /* 呼吸感背景光晕动画 */
        @keyframes breatheGlow {
            0% {
                background: radial-gradient(circle at 20% 30%, rgba(200, 230, 195, 0.96), rgba(165, 205, 155, 0.88));
            }
            100% {
                background: radial-gradient(circle at 80% 70%, rgba(220, 245, 210, 0.98), rgba(175, 215, 165, 0.9));
            }
        }

        /* 漂浮动态光晕球体 (纯css炫彩) */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(70px);
            pointer-events: none;
            z-index: 0;
            opacity: 0.5;
            animation: floatOrb 18s infinite alternate ease-in-out;
        }

        .orb1 {
            width: 45vw;
            height: 45vw;
            background: radial-gradient(circle, #c3e8c0, #9ccf9a);
            top: -15vh;
            left: -10vw;
            animation-duration: 22s;
        }
        .orb2 {
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, #d7f0cf, #aad6a3);
            bottom: -20vh;
            right: -15vw;
            animation-duration: 25s;
            animation-delay: -5s;
        }
        .orb3 {
            width: 30vw;
            height: 30vw;
            background: radial-gradient(circle, #eaffdd, #b9e2ae);
            top: 40%;
            left: 60%;
            animation-duration: 19s;
            animation-delay: -2s;
            opacity: 0.4;
        }

        @keyframes floatOrb {
            0% {
                transform: translate(0, 0) scale(1);
            }
            100% {
                transform: translate(6%, 8%) scale(1.2);
            }
        }

        /* Canvas粒子层 - 星辰流光 */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* 主内容容器 - 提升层级，玻璃质感 */
        .blog-container {
            position: relative;
            z-index: 10;
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            flex: 1;
        }

        /* 头部动态文字渐隐 */
        .blog-header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid rgba(180, 215, 170, 0.6);
            backdrop-filter: blur(2px);
        }

        .blog-title {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #2b6e3c, #62b86b, #b3e5a5);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shimmer 5s linear infinite;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 8px rgba(90, 140, 70, 0.2);
        }

        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .blog-author {
            font-size: 1.1rem;
            color: #467a4a;
            font-weight: 400;
            letter-spacing: 1px;
            backdrop-filter: blur(4px);
            display: inline-block;
            padding: 0 1rem;
        }

        /* 正中随机卡片 - 炫光玻璃风格 */
        .quote-center {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 1.2rem 0 2.2rem;
        }

        .quote-card {
            background: rgba(255, 252, 240, 0.68);
            backdrop-filter: blur(10px);
            max-width: 820px;
            width: 100%;
            padding: 2rem 2rem;
            border-radius: 58px;
            box-shadow: 0 25px 40px -12px rgba(40, 70, 30, 0.3), 0 0 0 1px rgba(220, 250, 200, 0.5) inset, 0 0 0 2px rgba(255, 255, 245, 0.3) inset;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(180, 215, 160, 0.7);
        }

        .quote-card:hover {
            transform: translateY(-6px) scale(1.01);
            box-shadow: 0 32px 48px -16px rgba(30, 70, 30, 0.4), 0 0 0 2px rgba(210, 245, 170, 0.6) inset;
            background: rgba(255, 254, 245, 0.78);
        }

        .quote-text {
            font-size: 1.85rem;
            font-weight: 500;
            line-height: 1.45;
            color: #1e4622;
            letter-spacing: -0.2px;
            margin-bottom: 1rem;
            transition: opacity 0.3s ease, transform 0.2s ease;
            text-shadow: 0 1px 2px rgba(255,255,210,0.8);
        }

        .quote-text.fade-out {
            opacity: 0;
            transform: scale(0.98);
        }

        .quote-author-sign {
            font-size: 0.9rem;
            color: #688f64;
            border-top: 1px solid rgba(140, 180, 120, 0.5);
            display: inline-block;
            padding-top: 0.7rem;
            margin-top: 0.5rem;
            font-style: italic;
        }

        .refresh-btn {
            background: linear-gradient(115deg, #e3f7e0, #c8e6c0);
            border: none;
            padding: 0.6rem 1.8rem;
            margin-top: 1.2rem;
            border-radius: 60px;
            font-size: 0.85rem;
            cursor: pointer;
            color: #2c6032;
            font-weight: 600;
            transition: 0.25s;
            box-shadow: 0 4px 12px rgba(70, 100, 50, 0.2);
            backdrop-filter: blur(4px);
            letter-spacing: 0.3px;
        }

        .refresh-btn:hover {
            background: linear-gradient(115deg, #cbecc4, #b1dcab);
            transform: scale(1.02) translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(70, 110, 50, 0.4);
            color: #1e4a23;
        }

        .refresh-btn:active {
            transform: scale(0.98);
        }

        /* 双卡片区域 玻璃+光效 */
        .main-content {
            display: flex;
            flex-wrap: wrap;
            gap: 2.5rem;
            margin: 2.5rem 0 2rem;
            align-items: stretch;
            justify-content: center;
        }

        .photo-card, .about-card {
            background: rgba(250, 250, 240, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 1.8rem;
            border: 1px solid rgba(190, 220, 170, 0.8);
            transition: all 0.35s ease;
            box-shadow: 0 12px 28px -12px rgba(0,0,0,0.15);
        }

        .photo-card:hover, .about-card:hover {
            transform: translateY(-8px);
            background: rgba(255, 253, 245, 0.85);
            box-shadow: 0 24px 40px -16px rgba(50, 80, 30, 0.3);
            border-color: rgba(150, 200, 120, 0.9);
        }

        .photo-card img {
            width: 100%;
            max-width: 280px;
            border-radius: 32px;
            box-shadow: 0 12px 24px rgba(0,0,0,0.1);
            transition: transform 0.4s ease, filter 0.3s;
            filter: brightness(1.02) contrast(1.02);
            border: 2px solid rgba(210, 235, 180, 0.8);
        }

        .photo-card img:hover {
            transform: scale(1.02) rotate(0.5deg);
            filter: brightness(1.05) saturate(1.02);
            box-shadow: 0 20px 30px -8px rgba(0,0,0,0.2);
        }

        .about-card h3 {
            font-size: 1.6rem;
            font-weight: 650;
            margin-bottom: 0.8rem;
            background: linear-gradient(145deg, #357a3b, #64b46b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .about-card p {
            font-size: 0.95rem;
            color: #2d542e;
            margin-bottom: 1rem;
            line-height: 1.5;
            font-weight: 450;
        }

        .small-links {
            display: flex;
            gap: 1.4rem;
            flex-wrap: wrap;
            margin-top: 0.8rem;
        }

        .small-links a {
            text-decoration: none;
            color: #528a55;
            font-size: 0.9rem;
            font-weight: 500;
            border-bottom: 1.5px dotted #a7cfaa;
            transition: 0.2s;
            backdrop-filter: blur(2px);
        }

        .small-links a:hover {
            color: #226a2a;
            border-bottom-color: #5fa862;
            text-shadow: 0 0 4px #c9f0bc;
            transform: translateX(3px);
            display: inline-block;
        }

        /* 页脚 */
        .blog-footer {
            text-align: center;
            padding: 2rem 1rem 1.8rem;
            margin-top: 2rem;
            border-top: 1px solid rgba(160, 200, 140, 0.6);
            color: #4b784a;
            font-size: 0.85rem;
            background: rgba(220, 240, 210, 0.3);
            backdrop-filter: blur(4px);
            border-radius: 48px 48px 0 0;
            position: relative;
            z-index: 10;
        }

        /* 自定义鼠标光晕跟随 */
        .cursor-glow {
            width: 32px;
            height: 32px;
            background: radial-gradient(circle, rgba(170, 230, 140, 0.65), rgba(120, 190, 90, 0.2));
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s, opacity 0.2s;
            filter: blur(4px);
            backdrop-filter: blur(2px);
            box-shadow: 0 0 20px rgba(150, 210, 110, 0.6);
        }

        /* 响应式优化 */
        @media (max-width: 760px) {
            .blog-title {
                font-size: 2.3rem;
            }
            .quote-text {
                font-size: 1.4rem;
            }
            .quote-card {
                padding: 1.6rem;
            }
            .main-content {
                flex-direction: column;
            }
            .cursor-glow {
                display: none; /* 移动端隐藏自定义光标 */
            }
            .orb {
                opacity: 0.3;
            }
        }

        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #cbe0cb;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #6f9a6b;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4d7a48;
        }
    </style>
</head>
<body>

<!-- 漂浮光晕装饰 -->
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<!-- Canvas 粒子流光系统 -->
<canvas id="particle-canvas"></canvas>

<!-- 鼠标跟随光晕 (PC酷炫) -->
<div class="cursor-glow" id="cursorGlow"></div>

<div class="blog-container">
    <header class="blog-header">
        <h1 class="blog-title">林下风来</h1>
        <div class="blog-author">Guying_xz · 记下微光与静思 | ✦ 流光纪事</div>
    </header>

    <!-- 正中随机句子 -->
    <div class="quote-center">
        <div class="quote-card">
            <div class="quote-text" id="randomQuote">正在加载一段话...</div>
            <div class="quote-author-sign">—— Guying_xz 的摘句</div>
            <button class="refresh-btn" id="refreshQuoteBtn">⟳ 换一句 · 心念流转</button>
        </div>
    </div>

    <!-- 照片 + 关于区域 -->
    <div class="main-content">
        <div class="photo-card">
            <img src="https://picsum.photos/id/104/300/300" alt="静谧光影" style="width:100%; max-width:260px; border-radius: 28px;">
            <p style="margin-top: 14px; color: #487a48; font-weight: 500;">🌿 树隙光斑 · 散步拾影</p>
        </div>
        <div class="about-card">
            <h3>✦ 关于 Guying_xz</h3>
            <p>一个喜欢记录日常、安静写字的普通人。相信缓慢的、温柔的坚持。这里没有喧嚣，只有文字与植物般的生长。<br>
            在瞬息万变的世界，做自己的微风。</p>
            <div class="small-links">
                <a href="https://x.com/Guying_xz" target="_blank" rel="noopener noreferrer"> X</a>
                <a href="https://space.bilibili.com/3546932473498063?spm_id_from=333.1007.0.0" target="_blank" rel="noopener noreferrer"> Bilibili</a>
            </div>
        </div>
    </div>
</div>

<footer class="blog-footer">
    <p>© 2026 Guying_xz · 淡绿色小栈 | 无喧哗，自有声 ✨ 粒子流光·玻璃幻境</p>
    <p style="margin-top: 6px; font-size:0.7rem;">每一次随机句子，都是给自己的小礼物 | 轻触光影 呼吸自然</p>
</footer>

<script>
    // ---------- 1. 随机句子库 + 动态刷新 (保留原有优雅动画并增强) ----------
    const quoteList = [
        "缓慢而坚定地生长，时间会给出答案。",
        "日常里藏着无数细碎的光，只需安静注视。",
        "写下去，像植物向着光。",
        "不急，慢慢来。把今日过成一首短诗。",
        "朴素生活，遥远梦想。保持温柔与好奇。",
        "让阅读成为一种呼吸，写作成为回音。",
        "在不确定的日子里，向内扎根。",
        "春天温柔，万物有序。记录本身就是意义。",
        "偶尔停下来，看云看树，听风说话。",
        "做具体的事，爱具体的瞬间。",
        "文字是沉默的回响，也是远方的信使。",
        "不需要成为别人，只需成为更清晰的自己。",
        "星辰流转，林下总有风来。",
        "以柔软心阅世，以明亮笔写诗。"
    ];

    function getRandomQuote() {
        return quoteList[Math.floor(Math.random() * quoteList.length)];
    }

    let fadeTimeout = null;
    const quoteElement = document.getElementById('randomQuote');

    function updateQuoteWithFade() {
        if (!quoteElement) return;
        if (fadeTimeout) {
            clearTimeout(fadeTimeout);
            quoteElement.classList.remove('fade-out');
        }
        quoteElement.classList.add('fade-out');
        // 添加额外卡片光效脉冲
        const card = document.querySelector('.quote-card');
        if (card) {
            card.style.transition = 'box-shadow 0.2s';
            card.style.boxShadow = '0 0 0 3px rgba(190, 230, 150, 0.8), 0 20px 35px -12px rgba(0,0,0,0.3)';
            setTimeout(() => {
                card.style.boxShadow = '';
            }, 300);
        }
        fadeTimeout = setTimeout(() => {
            quoteElement.textContent = getRandomQuote();
            quoteElement.classList.remove('fade-out');
            fadeTimeout = null;
        }, 320);
    }

    // ---------- 2. 酷炫粒子系统 (动态星光，流动感) ----------
    const canvas = document.getElementById('particle-canvas');
    let ctx = canvas.getContext('2d');
    let particles = [];
    let particleCount = 110;
    let mouseX = null, mouseY = null;
    let canvasWidth, canvasHeight;

    class Particle {
        constructor(x, y, radius, speedX, speedY, color, alpha) {
            this.x = x;
            this.y = y;
            this.radius = radius;
            this.speedX = speedX;
            this.speedY = speedY;
            this.color = color;
            this.alpha = alpha;
            this.originalAlpha = alpha;
        }
        draw() {
            if (!ctx) return;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.alpha})`;
            ctx.fill();
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            // 边界重置，环形漂浮
            if (this.x < -20) this.x = canvasWidth + 20;
            if (this.x > canvasWidth + 20) this.x = -20;
            if (this.y < -20) this.y = canvasHeight + 20;
            if (this.y > canvasHeight + 20) this.y = -20;
            
            // 鼠标附近粒子轻微互动 (增加炫感)
            if (mouseX !== null && mouseY !== null) {
                let dx = mouseX - this.x;
                let dy = mouseY - this.y;
                let distance = Math.sqrt(dx*dx + dy*dy);
                if (distance < 80) {
                    let force = (80 - distance) / 80 * 0.6;
                    this.x -= dx * force * 0.02;
                    this.y -= dy * force * 0.02;
                    // 增加亮度交互
                    this.alpha = Math.min(this.originalAlpha + 0.25, 0.9);
                } else {
                    this.alpha += (this.originalAlpha - this.alpha) * 0.05;
                }
            } else {
                this.alpha += (this.originalAlpha - this.alpha) * 0.03;
            }
        }
    }

    function initParticles() {
        particles = [];
        const colorPalette = [
            { r: 145, g: 190, b: 120 },  // 草绿
            { r: 170, g: 215, b: 130 },
            { r: 200, g: 230, b: 160 },
            { r: 110, g: 165, b: 90 },
            { r: 210, g: 240, b: 170 },
            { r: 150, g: 200, b: 115 }
        ];
        for (let i = 0; i < particleCount; i++) {
            let radius = Math.random() * 3.5 + 1.2;
            let x = Math.random() * canvasWidth;
            let y = Math.random() * canvasHeight;
            let speedX = (Math.random() - 0.5) * 0.45;
            let speedY = (Math.random() - 0.5) * 0.35;
            let colorObj = colorPalette[Math.floor(Math.random() * colorPalette.length)];
            let alpha = Math.random() * 0.5 + 0.2;
            particles.push(new Particle(x, y, radius, speedX, speedY, colorObj, alpha));
        }
    }

    function resizeCanvas() {
        canvasWidth = window.innerWidth;
        canvasHeight = window.innerHeight;
        canvas.width = canvasWidth;
        canvas.height = canvasHeight;
        initParticles();
    }

    function animateParticles() {
        if (!ctx) return;
        ctx.clearRect(0, 0, canvasWidth, canvasHeight);
        for (let p of particles) {
            p.update();
            p.draw();
        }
        // 额外绘制微光连接线 (可选, 增加科技感)
        if (particles.length > 0) {
            ctx.beginPath();
            ctx.strokeStyle = "rgba(140, 200, 110, 0.18)";
            ctx.lineWidth = 0.6;
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    let dx = particles[i].x - particles[j].x;
                    let dy = particles[i].y - particles[j].y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 100 && dist > 8) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }
        requestAnimationFrame(animateParticles);
    }

    // 窗口尺寸自适应
    window.addEventListener('resize', () => {
        resizeCanvas();
    });

    // 鼠标追踪 (酷炫光标 & 粒子交互)
    const cursorGlow = document.getElementById('cursorGlow');
    document.addEventListener('mousemove', (e) => {
        if (cursorGlow) {
            cursorGlow.style.left = e.clientX + 'px';
            cursorGlow.style.top = e.clientY + 'px';
            // 跟随同时增加呼吸效果
            cursorGlow.style.width = '38px';
            cursorGlow.style.height = '38px';
            setTimeout(() => {
                if (cursorGlow) {
                    cursorGlow.style.width = '32px';
                    cursorGlow.style.height = '32px';
                }
            }, 150);
        }
        // 粒子系统互动鼠标坐标
        mouseX = e.clientX;
        mouseY = e.clientY;
    });

    document.addEventListener('mouseleave', () => {
        mouseX = null;
        mouseY = null;
    });

    // 启动粒子世界
    resizeCanvas();
    animateParticles();

    // ---------- 3. 初始化随机句子和按钮事件 ----------
    document.addEventListener('DOMContentLoaded', () => {
        if (quoteElement) {
            // 平滑显示首句
            quoteElement.style.opacity = '0';
            quoteElement.textContent = getRandomQuote();
            setTimeout(() => {
                quoteElement.style.transition = 'opacity 0.4s';
                quoteElement.style.opacity = '1';
                quoteElement.classList.remove('fade-out');
            }, 50);
        }
        const refreshBtn = document.getElementById('refreshQuoteBtn');
        if (refreshBtn) refreshBtn.addEventListener('click', updateQuoteWithFade);

        // 社交链接占位提醒 + 炫酷弹窗风格
        const socialLinks = document.querySelectorAll('.small-links a');
        socialLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                if (link.getAttribute('href') === '#') {
                    e.preventDefault();
                    // 轻提示风格
                    const toast = document.createElement('div');
                    toast.innerText = '✨ 请在此填入你的社交主页链接 ✨';
                    toast.style.position = 'fixed';
                    toast.style.bottom = '25px';
                    toast.style.left = '50%';
                    toast.style.transform = 'translateX(-50%)';
                    toast.style.backgroundColor = 'rgba(45, 70, 40, 0.85)';
                    toast.style.backdropFilter = 'blur(12px)';
                    toast.style.color = '#e7ffda';
                    toast.style.padding = '10px 24px';
                    toast.style.borderRadius = '50px';
                    toast.style.fontSize = '0.85rem';
                    toast.style.zIndex = '9999';
                    toast.style.fontWeight = '500';
                    toast.style.border = '1px solid #b1dd9e';
                    toast.style.boxShadow = '0 8px 20px rgba(0,0,0,0.2)';
                    document.body.appendChild(toast);
                    setTimeout(() => {
                        toast.style.opacity = '0';
                        setTimeout(() => toast.remove(), 800);
                    }, 1800);
                }
            });
        });

        // 添加炫彩标题闪烁小彩蛋: 点击博客标题光效涟漪
        const titleElem = document.querySelector('.blog-title');
        if (titleElem) {
            titleElem.addEventListener('click', (e) => {
                const ripple = document.createElement('span');
                ripple.style.position = 'absolute';
                ripple.style.borderRadius = '50%';
                ripple.style.backgroundColor = 'rgba(180, 230, 140, 0.5)';
                ripple.style.width = '20px';
                ripple.style.height = '20px';
                ripple.style.transform = 'scale(0)';
                ripple.style.transition = 'transform 0.6s ease-out, opacity 0.6s';
                ripple.style.opacity = '0.8';
                ripple.style.pointerEvents = 'none';
                const rect = titleElem.getBoundingClientRect();
                ripple.style.left = (e.clientX - rect.left - 10) + 'px';
                ripple.style.top = (e.clientY - rect.top - 10) + 'px';
                titleElem.style.position = 'relative';
                titleElem.appendChild(ripple);
                setTimeout(() => {
                    ripple.style.transform = 'scale(20)';
                    ripple.style.opacity = '0';
                }, 10);
                setTimeout(() => ripple.remove(), 700);
            });
        }
    });
</script>
</body>
</html>
